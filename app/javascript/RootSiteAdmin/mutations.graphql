#import "./queries.graphql"

mutation UpdateRootSite($siteName: String, $authLayoutId: ID, $defaultLayoutId: ID, $rootPageId: ID) {
  updateRootSite(
    input: {
      root_site: {
        site_name: $siteName
        authLayoutId: $authLayoutId
        defaultLayoutId: $defaultLayoutId
        rootPageId: $rootPageId
      }
    }
  ) {
    root_site {
      id
      ...RootSiteFields
    }
  }
}
